name: Docker Image CI

on:
  workflow_dispatch:
  # push:
  #   branches: [ "release" ]

permissions:
  contents: read
  packages: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag ghcr.io/${{ github.repository_owner }}/hackboxconsole:latest
    
    - name: Push the Docker image
      run: docker push ghcr.io/${{ github.repository_owner }}/hackboxconsole:latest

